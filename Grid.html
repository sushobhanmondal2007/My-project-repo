<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Grid Layout Wireframe</title>
    <style>
        .main {
            display: grid;
            grid-template-areas:
                "box1 box1 box2 box3"
                "box4 box5 box5 box3";
            grid-gap: 15px;
            border: 2px solid #000000;
            padding: 20px;
            background: #ffffff;
            max-width: 900px;
            margin: 20px auto;
        }

        .main>div {
            border: 2px solid #000000;

            min-height: 100px;
        }

        .box1 {
            grid-area: box1;
            background-color: red;
        }

        .box2 {
            grid-area: box2;
            background-color: blue;
        }

        .box3 {
            grid-area: box3;
            background-color: green;
        }

        .box4 {
            grid-area: box4;
            background-color: yellow;
        }

        .box5 {
            grid-area: box5;
            background-color: orange;
        }
    </style>
</head>

<body>

    <div class="main">
        <div class="box1"></div>
        <div class="box2"></div>
        <div class="box3"></div>
        <div class="box4"></div>
        <div class="box5"></div>
    </div>

</body>

</html>
